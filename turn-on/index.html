<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Turn on the extension</title>
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="progress" aria-label="Setup progress">
        <span class="progress__bar"><span class="progress__fill" style="width: 50%;"></span></span>
        <span class="progress__label">Step 1 of 2</span>
      </div>
    </header>

    <main class="page page--turn-on">
      <h1 class="headline">Turn it on.</h1>
      <p class="lede">Get help with the pages you're on.</p>

      <ol class="steps-vertical">
        <li class="step">
          <span class="step__num" aria-hidden="true">1</span>
          <span class="step__body">
            Tap
            <span class="inline-icon inline-icon--aa" aria-label="page settings button">
              <svg viewBox="0 0 24 16" width="28" height="18" fill="none">
                <text x="2" y="13" font-family="-apple-system, system-ui, sans-serif" font-size="9" font-weight="600" fill="currentColor">A</text>
                <text x="11" y="13" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="currentColor">A</text>
              </svg>
            </span>
            in the search bar
          </span>
        </li>
        <li class="step">
          <span class="step__num" aria-hidden="true">2</span>
          <span class="step__body">
            Select "Manage Extensions"
            <span class="inline-icon inline-icon--puzzle" aria-label="puzzle piece">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M14 4a2 2 0 1 0-4 0v2H6a2 2 0 0 0-2 2v3.5a1 1 0 0 1-1 1 2 2 0 0 0 0 4 1 1 0 0 1 1 1V20a2 2 0 0 0 2 2h3.5a1 1 0 0 1 1-1 2 2 0 0 1 4 0 1 1 0 0 1 1 1H19a2 2 0 0 0 2-2v-4a2 2 0 1 0 0-4v-4a2 2 0 0 0-2-2h-4V4z"/>
              </svg>
            </span>
          </span>
        </li>
        <li class="step">
          <span class="step__num" aria-hidden="true">3</span>
          <span class="step__body">
            Toggle on
            <span class="inline-icon inline-icon--badge" aria-hidden="true">
              
            </span>
            the extension
            <span class="inline-icon inline-icon--toggle" aria-label="toggle on">
              <span class="inline-icon__toggle"><span class="inline-icon__knob"></span></span>
            </span>
          </span>
        </li>
      </ol>

      <div class="pointer-down" aria-hidden="true">
        <span class="pointer-down__emoji">👇</span>
      </div>
    </main>
    <script>
      // Safari shows a back button when there's navigation history,
      // which shifts the AA button to the right. Detect this and
      // adjust the pointer position so it aims at the AA button
      // instead of the back button.
      (function () {
        var hasBack = history.length > 1 || document.referrer;
        if (hasBack) {
          document.querySelector('.pointer-down').classList.add('pointer-down--has-back');
        }
      })();
    </script>
  </body>
</html>
